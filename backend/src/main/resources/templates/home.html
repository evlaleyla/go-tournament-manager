<!DOCTYPE html>
<html lang="de" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Go Tournament Manager</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>

<div th:replace="~{fragments/header :: publicHeader}"></div>

<main class="container">

    <section class="card">
        <h1>Go Tournament Manager</h1>
        <p class="page-subtitle">
            Öffentliche Turnierübersicht, Online-Anmeldung sowie veröffentlichte Paarungen und Ergebnisse.
            Der Administrationsbereich dient der organisatorischen Verwaltung.
        </p>

        <div class="actions">
            <a class="btn" th:href="@{/public/tournaments}">
                Öffentlichen Bereich öffnen
            </a>

            <a class="btn btn-secondary" th:href="@{/admin}">
                Administrationsbereich für Organisator:innen
            </a>
        </div>
    </section>

</main>

</body>
</html>
