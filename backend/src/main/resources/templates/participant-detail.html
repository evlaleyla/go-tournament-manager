<!DOCTYPE html>
<html lang="de" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Details der teilnehmenden Person</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>

<div th:replace="~{fragments/header :: adminHeader}"></div>

<main class="container">

    <div class="page-header">
        <div>
            <h1 th:text="${participant.fullName}">Teilnehmername</h1>
            <p class="page-subtitle">
                Stammdaten der teilnehmenden Person.
            </p>
        </div>

        <div class="actions">
            <a class="btn btn-secondary" th:href="@{/participants}">
                Zur Teilnehmendenliste
            </a>

            <a class="btn" th:href="@{/participants/{id}/edit(id=${participant.id})}">
                Bearbeiten
            </a>
        </div>
    </div>

    <div th:if="${successMessage}" class="flash-success" th:text="${successMessage}"></div>
    <div th:if="${errorMessage}" class="flash-error" th:text="${errorMessage}"></div>

    <section class="card">
        <h2>Stammdaten</h2>

        <dl class="detail-list">
            <dt>ID</dt>
            <dd th:text="${participant.id}"></dd>

            <dt>Vorname</dt>
            <dd th:text="${participant.firstName}"></dd>

            <dt>Nachname</dt>
            <dd th:text="${participant.lastName}"></dd>

            <dt>E-Mail</dt>
            <dd th:text="${participant.email}"></dd>

            <dt>Geburtsdatum</dt>
            <dd th:text="${participant.birthDate}"></dd>

            <dt>Verein</dt>
            <dd th:text="${participant.club}"></dd>

            <dt>Land</dt>
            <dd th:text="${participant.countryDisplay}"></dd>

            <dt>Rang</dt>
            <dd th:text="${participant.rank}"></dd>
        </dl>
    </section>

    <section class="card">
        <h2>Administration</h2>

        <div class="actions">
            <a class="btn btn-secondary" th:href="@{/participants/{id}/edit(id=${participant.id})}">
                Teilnehmende Person bearbeiten
            </a>

            <form th:action="@{/participants/{id}/delete(id=${participant.id})}"
                  method="post"
                  onsubmit="return confirm('Möchten Sie diesen Teilnehmenden wirklich löschen?');">
                <button type="submit" class="btn-danger">
                    Teilnehmende Person löschen
                </button>
            </form>
        </div>
    </section>

</main>

</body>
</html>
