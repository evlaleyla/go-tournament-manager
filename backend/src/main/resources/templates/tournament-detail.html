<!DOCTYPE html>
<html lang="de" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Turnierdetails</title>
</head>
<body>
<h1>Turnierdetails</h1>

<div th:if="${successMessage}">
  <p th:text="${successMessage}"></p>
</div>

<p><strong>ID:</strong> <span th:text="${tournament.id}"></span></p>
<p><strong>Name:</strong> <span th:text="${tournament.name}"></span></p>
<p><strong>Ort:</strong> <span th:text="${tournament.location}"></span></p>
<p><strong>Startdatum:</strong> <span th:text="${tournament.startDate}"></span></p>
<p><strong>Enddatum:</strong> <span th:text="${tournament.endDate}"></span></p>
<p><strong>Anmeldefrist:</strong> <span th:text="${tournament.registrationDeadline}"></span></p>
<p><strong>Beschreibung:</strong> <span th:text="${tournament.description}"></span></p>
<p><strong>Status:</strong> <span th:text="${tournament.status.displayName}"></span></p>

<p>
  <a th:href="@{/tournaments/{id}/edit(id=${tournament.id})}">Bearbeiten</a>
</p>

<p>
  <a th:href="@{/registrations(tournamentId=${tournament.id})}">Anmeldungen dieses Turniers anzeigen</a>
</p>

<p>
  <a th:href="@{/registrations/new(tournamentId=${tournament.id})}">Neue Anmeldung für dieses Turnier anlegen</a>
</p>

<form th:action="@{/tournaments/{id}/delete(id=${tournament.id})}"
      method="post"
      onsubmit="return confirm('Möchten Sie dieses Turnier wirklich löschen?');">
  <button type="submit">Turnier löschen</button>
</form>

<p>
  <a href="/tournaments">Zurück zur Turnierliste</a>
</p>

<p>
  <a th:href="@{/tournaments/{id}/startlist(id=${tournament.id})}">Startliste anzeigen</a>
</p>

<p>
  <a th:href="@{/tournaments/{id}/pairings(id=${tournament.id})}">Paarungen anzeigen / importieren</a>
</p>

</body>
</html>
