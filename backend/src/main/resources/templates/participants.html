<!DOCTYPE html>
<html lang="de" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Teilnehmende</title>
</head>
<body>
<h1>Teilnehmerliste</h1>

<div th:if="${successMessage}">
    <p th:text="${successMessage}"></p>
</div>

<p>
    <a href="/participants/new">Neuen Teilnehmer anlegen</a>
</p>

<table border="1">
    <thead>
    <tr>
        <th>ID</th>
        <th>Vorname</th>
        <th>Nachname</th>
        <th>E-Mail</th>
        <th>Verein</th>
        <th>Land</th>
        <th>Geburtsdatum</th>
        <th>Rang</th>
        <th>Aktionen</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="participant : ${participants}">
        <td th:text="${participant.id}"></td>
        <td th:text="${participant.firstName}"></td>
        <td th:text="${participant.lastName}"></td>
        <td th:text="${participant.email}"></td>
        <td th:text="${participant.club}"></td>
        <td th:text="${participant.country}"></td>
        <td th:text="${participant.birthDate}"></td>
        <td th:text="${participant.rank}"></td>
        <td>
            <a th:href="@{/participants/{id}(id=${participant.id})}">Details</a>
            |
            <a th:href="@{/participants/{id}/edit(id=${participant.id})}">Bearbeiten</a>
        </td>
    </tr>
    </tbody>
</table>

<p>
    <a href="/">Zur Startseite</a>
</p>
</body>
</html>
