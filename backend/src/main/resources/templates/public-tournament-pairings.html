<!DOCTYPE html>
<html lang="de" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Paarungen und Ergebnisse</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>

<div th:replace="~{fragments/header :: publicHeader}"></div>

<main class="container">

    <div class="page-header">
        <div>
            <h1>Paarungen und Ergebnisse</h1>
            <p class="page-subtitle" th:text="${tournament.name}">
                Turniername
            </p>
        </div>

        <div class="actions">
            <a class="btn btn-secondary"
               th:href="@{/public/tournaments/{id}(id=${tournament.id})}">
                Zurück zur Turnierseite
            </a>
        </div>
    </div>

    <section class="card">
        <h2>Turnierdaten</h2>

        <dl class="detail-list">
            <dt>Ort</dt>
            <dd th:text="${tournament.location}">Ort</dd>

            <dt>Startdatum</dt>
            <dd th:text="${tournament.startDate}">Startdatum</dd>

            <dt>Enddatum</dt>
            <dd th:text="${tournament.endDate}">Enddatum</dd>

            <dt>Status</dt>
            <dd>
                <span class="badge" th:text="${tournament.status.displayName}">
                    Status
                </span>
            </dd>
        </dl>
    </section>

    <section th:each="round : ${availableRounds}"
             th:with="roundPairings=${pairingsByRound.get(round)}"
             class="card"
             th:id="|round-${round}|">

        <h2>
            Runde
            <span th:text="${round}">1</span>
        </h2>

        <table th:if="${!#lists.isEmpty(roundPairings)}">
            <thead>
            <tr>
                <th>Tisch</th>
                <th>Schwarz</th>
                <th>Weiß</th>
                <th>Ergebnis</th>
                <th>Vorgabe</th>
                <th>Freilos</th>
            </tr>
            </thead>

            <tbody>
            <tr th:each="pairing : ${roundPairings}">
                <td th:text="${pairing.tableNumber}">1</td>
                <td th:text="${pairing.blackPlayer}">Schwarz</td>
                <td th:text="${pairing.whitePlayer}">Weiß</td>
                <td>
                    <span class="badge" th:text="${pairing.resultDisplay}">
                        offen
                    </span>
                </td>
                <td th:text="${pairing.handicapDisplay}">-</td>
                <td th:text="${pairing.byeDisplay}">Nein</td>
            </tr>
            </tbody>
        </table>

        <div th:if="${#lists.isEmpty(roundPairings)}"
             class="empty-state">
            Für diese Runde liegen derzeit noch keine veröffentlichten Paarungen vor.
        </div>

    </section>
</main>

</body>
</html>
