<!DOCTYPE html>
<html lang="de" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Neue Anmeldung</title>
</head>
<body>
<h1>Neue Anmeldung anlegen</h1>

<form th:action="@{/registrations}" th:object="${registrationForm}" method="post">

  <div th:if="${#fields.hasGlobalErrors()}">
    <p th:each="err : ${#fields.globalErrors()}" th:text="${err}"></p>
  </div>

  <div>
    <label for="tournamentId">Turnier:</label>
    <select id="tournamentId" th:field="*{tournamentId}">
      <option value="">Bitte wählen</option>
      <option th:each="tournament : ${tournaments}"
              th:value="${tournament.id}"
              th:text="${tournament.name}">
      </option>
    </select>
    <div th:if="${#fields.hasErrors('tournamentId')}" th:errors="*{tournamentId}"></div>
  </div>

  <div>
    <label for="participantId">Teilnehmer:</label>
    <select id="participantId" th:field="*{participantId}">
      <option value="">Bitte wählen</option>
      <option th:each="participant : ${participants}"
              th:value="${participant.id}"
              th:text="${participant.fullName}">
      </option>
    </select>
    <div th:if="${#fields.hasErrors('participantId')}" th:errors="*{participantId}"></div>
  </div>

  <div>
    <label for="notes">Notizen:</label>
    <textarea id="notes" th:field="*{notes}"></textarea>
  </div>

  <div>
    <button type="submit">Speichern</button>
  </div>
</form>

<p>
  <a href="/registrations">Zur Anmeldeliste</a>
</p>
</body>
</html>
