<!DOCTYPE html>
<html lang="de" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Online-Anmeldung</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<div th:replace="~{fragments/header :: publicHeader}"></div>

<main class="container">
<h1>Online-Anmeldung</h1>

    <div th:if="${successMessage}" class="flash-success" th:text="${successMessage}"></div>

<h2 th:text="${tournament.name}"></h2>

<p><strong>Ort:</strong> <span th:text="${tournament.location}"></span></p>
<p><strong>Startdatum:</strong> <span th:text="${tournament.startDate}"></span></p>
<p><strong>Enddatum:</strong> <span th:text="${tournament.endDate}"></span></p>
<p><strong>Anmeldefrist:</strong> <span th:text="${tournament.registrationDeadline}"></span></p>
<p><strong>Status:</strong> <span th:text="${tournament.status.displayName}"></span></p>

<form th:action="@{/tournaments/{id}/register(id=${tournament.id})}"
      th:object="${selfRegistrationForm}"
      method="post">

    <div th:if="${#fields.hasGlobalErrors()}">
        <p th:each="err : ${#fields.globalErrors()}" th:text="${err}"></p>
    </div>

    <div>
        <label for="firstName">Vorname:</label>
        <input type="text" id="firstName" th:field="*{firstName}">
        <div th:if="${#fields.hasErrors('firstName')}" th:errors="*{firstName}"></div>
    </div>

    <div>
        <label for="lastName">Nachname:</label>
        <input type="text" id="lastName" th:field="*{lastName}">
        <div th:if="${#fields.hasErrors('lastName')}" th:errors="*{lastName}"></div>
    </div>

    <div>
        <label for="email">E-Mail:</label>
        <input type="email" id="email" th:field="*{email}">
        <div th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>
    </div>

    <div>
        <label for="country">Land:</label>
        <select id="country" th:field="*{country}">
            <option value="">Bitte wählen</option>
            <option th:each="country : ${countryOptions}"
                    th:value="${country.code}"
                    th:text="${country.name}">
            </option>
        </select>
    </div>

    <div>
        <label for="club">Verein:</label>
        <input type="text"
               id="club"
               th:field="*{club}"
               list="clubList"
               placeholder="Bitte zuerst Land wählen">

        <datalist id="clubList"></datalist>
    </div>

    <div>
        <label for="rank">Rang:</label>
        <input type="text" id="rank" th:field="*{rank}" list="rankList">

        <datalist id="rankList">
            <option th:each="rank : ${rankOptions}"
                    th:value="${rank}">
            </option>
        </datalist>

        <div th:if="${#fields.hasErrors('rank')}" th:errors="*{rank}"></div>
    </div>

    <div>
        <label for="birthDate">Geburtsdatum:</label>
        <input type="date" id="birthDate" th:field="*{birthDate}">
        <div th:if="${#fields.hasErrors('birthDate')}" th:errors="*{birthDate}"></div>
    </div>

    <div>
        <label for="plannedRounds">Wie viele Runden spielst du mit?</label>
        <input type="number" id="plannedRounds" th:field="*{plannedRounds}" min="1">
        <div th:if="${#fields.hasErrors('plannedRounds')}" th:errors="*{plannedRounds}"></div>
    </div>

    <div>
        <label for="notes">Notizen:</label>
        <textarea id="notes" th:field="*{notes}"></textarea>
    </div>

    <div>
        <button type="submit">Anmeldung absenden</button>
    </div>
</form>

<p>
    <a th:href="@{/public/tournaments/{id}(id=${tournament.id})}">Zurück zur Turnierseite</a>
</p>

<script th:inline="javascript">
    const clubsByCountry = /*[[${clubsByCountry}]]*/ {};

    const countrySelect = document.getElementById("country");
    const clubInput = document.getElementById("club");
    const clubList = document.getElementById("clubList");

    function updateClubOptions(clearInvalidClub) {
        const selectedCountry = countrySelect.value;
        const clubs = clubsByCountry[selectedCountry] || [];

        clubList.innerHTML = "";

        clubs.forEach(function (club) {
            const option = document.createElement("option");
            option.value = club;
            clubList.appendChild(option);
        });

        const currentClub = clubInput.value.trim();

        if (clearInvalidClub && currentClub !== "") {
            const isStillValid = clubs.some(function (club) {
                return club.toLowerCase() === currentClub.toLowerCase();
            });

            if (!isStillValid) {
                clubInput.value = "";
            }
        }

        if (!selectedCountry) {
            clubInput.disabled = true;
            clubInput.placeholder = "Bitte zuerst Land wählen";
        } else if (clubs.length === 0) {
            clubInput.disabled = true;
            clubInput.placeholder = "Für dieses Land sind keine Vereine hinterlegt";
        } else {
            clubInput.disabled = false;
            clubInput.placeholder = "Verein auswählen";
        }
    }

    document.addEventListener("DOMContentLoaded", function () {
        updateClubOptions(false);

        countrySelect.addEventListener("change", function () {
            updateClubOptions(true);
        });
    });
</script>
</main>
</body>
</html>
