<!DOCTYPE html>
<html lang="de" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>MacMahon Wall List</title>
</head>
<body>
<h1>MacMahon Wall List</h1>

<h2 th:text="${tournament.name}"></h2>

<div th:if="${successMessage}">
    <p th:text="${successMessage}"></p>
</div>

<div th:if="${errorMessage}">
    <p th:text="${errorMessage}"></p>
</div>

<form th:action="@{/tournaments/{id}/walllist/import-macmahon(id=${tournament.id})}"
      method="post"
      enctype="multipart/form-data">
    <div>
        <input type="file" name="file">
        <button type="submit">MacMahon-Wall-List importieren</button>
    </div>
</form>

<table border="1" th:if="${wallListEntries != null}">
    <thead>
    <tr>
        <th>Platz</th>
        <th>Name</th>
        <th>Club</th>
        <th>Level</th>
        <th>Score</th>
        <th th:each="i : ${#numbers.sequence(1, roundColumnCount)}"
            th:text="'Runde ' + ${i}"></th>
        <th>Punkte</th>
        <th>ScoreX</th>
        <th>SOS</th>
        <th>SOSOS</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="entry : ${wallListEntries}">
        <td th:text="${entry.place}"></td>
        <td th:text="${entry.name}"></td>
        <td th:text="${entry.club}"></td>
        <td th:text="${entry.level}"></td>
        <td th:text="${entry.score}"></td>
        <td th:each="status : ${entry.roundStatuses}" th:text="${status}"></td>
        <td th:text="${entry.points}"></td>
        <td th:text="${entry.scoreX}"></td>
        <td th:text="${entry.sos}"></td>
        <td th:text="${entry.sosos}"></td>
    </tr>
    </tbody>
</table>

<p>
    <a th:href="@{/tournaments/{id}/pairings(id=${tournament.id})}">
        Zurück zu den Paarungen
    </a>
</p>
</body>
</html>
