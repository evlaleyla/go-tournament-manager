<!DOCTYPE html>
<html lang="de" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Öffentliche Turnierübersicht</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>

<div th:replace="~{fragments/header :: publicHeader}"></div>

<main class="container">

    <div class="page-header">
        <div>
            <h1>Öffentliche Turnierübersicht</h1>
            <p class="page-subtitle">
                Turniere ansehen, Informationen abrufen und bei geöffneter Anmeldung teilnehmen.
            </p>
        </div>
    </div>

    <section class="card">
        <h2>Suche und Filter</h2>

        <form th:action="@{/public/tournaments}" method="get" class="form-grid">

            <div class="grid grid-2">
                <div class="form-row">
                    <label for="search">Suche nach Name</label>
                    <input type="text"
                           id="search"
                           name="search"
                           th:value="${search}"
                           placeholder="Turniername eingeben">
                </div>

                <div class="form-row">
                    <label for="status">Status</label>
                    <select id="status" name="status">
                        <option value="">Alle</option>
                        <option th:each="statusOption : ${statuses}"
                                th:value="${statusOption}"
                                th:text="${statusOption.displayName}"
                                th:selected="${selectedStatus != null and selectedStatus.name() == statusOption.name()}">
                        </option>
                    </select>
                </div>
            </div>

            <div class="grid grid-2">
                <div class="form-row">
                    <label for="location">Ort</label>
                    <input type="text"
                           id="location"
                           name="location"
                           th:value="${location}"
                           placeholder="z. B. Frankfurt">
                </div>

                <div class="form-row">
                    <label for="startDateFrom">Startdatum ab</label>
                    <input type="date"
                           id="startDateFrom"
                           name="startDateFrom"
                           th:value="${startDateFrom}">
                </div>
            </div>

            <div class="form-row">
                <label for="startDateTo">Startdatum bis</label>
                <input type="date"
                       id="startDateTo"
                       name="startDateTo"
                       th:value="${startDateTo}">
            </div>

            <div class="actions">
                <button type="submit">Filtern</button>
                <a class="btn btn-secondary" th:href="@{/public/tournaments}">
                    Zurücksetzen
                </a>
            </div>
        </form>
    </section>

    <section class="card">
        <h2>Turniere</h2>

        <table th:if="${!#lists.isEmpty(tournaments)}">
            <thead>
            <tr>
                <th>Name</th>
                <th>Ort</th>
                <th>Startdatum</th>
                <th>Enddatum</th>
                <th>Anmeldefrist</th>
                <th>Status</th>
                <th>Aktion</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="tournament : ${tournaments}">
                <td th:text="${tournament.name}"></td>
                <td th:text="${tournament.location}"></td>
                <td th:text="${tournament.startDate != null ? #temporals.format(tournament.startDate, 'dd.MM.yyyy') : '-'}"></td>
                <td th:text="${tournament.endDate != null ? #temporals.format(tournament.endDate, 'dd.MM.yyyy') : '-'}"></td>
                <td th:text="${tournament.registrationDeadline != null ? #temporals.format(tournament.registrationDeadline, 'dd.MM.yyyy') : '-'}"></td>
                <td>
                    <span class="badge" th:text="${tournament.status.displayName}"></span>
                </td>
                <td>
                    <a class="btn btn-secondary"
                       th:href="@{/public/tournaments/{id}(id=${tournament.id})}">
                        Details
                    </a>
                </td>
            </tr>
            </tbody>
        </table>

        <div th:if="${#lists.isEmpty(tournaments)}" class="empty-state">
            Es sind derzeit keine Turniere veröffentlicht.
        </div>
    </section>

</main>

</body>
</html>
