<!DOCTYPE html>
<html lang="de" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${isEdit} ? 'Turnier bearbeiten' : 'Neues Turnier'">Turnierformular</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>

<div th:replace="~{fragments/header :: adminHeader}"></div>

<main class="container">

    <div class="page-header">
        <div>
            <h1 th:text="${isEdit} ? 'Turnier bearbeiten' : 'Neues Turnier anlegen'"></h1>
            <p class="page-subtitle">
                Stammdaten, Zeitraum, Rundenzahl und Status erfassen.
            </p>
        </div>

        <div class="actions">
            <a class="btn btn-secondary" th:href="@{/tournaments}">
                Zur Turnierliste
            </a>
        </div>
    </div>

    <section class="card">
        <form th:action="${isEdit} ? @{/tournaments/{id}(id=${tournament.id})} : @{/tournaments}"
              th:object="${tournament}"
              method="post"
              class="form-grid">

            <input type="hidden" th:field="*{id}">

            <div class="form-row">
                <label for="name">Name</label>
                <input type="text" id="name" th:field="*{name}">
                <div class="field-error" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
            </div>

            <div class="form-row">
                <label for="location">Ort</label>
                <input type="text" id="location" th:field="*{location}">
            </div>

            <div class="grid grid-2">
                <div class="form-row">
                    <label for="startDate">Startdatum</label>
                    <input type="date" id="startDate" th:field="*{startDate}">
                    <div class="field-error" th:if="${#fields.hasErrors('startDate')}" th:errors="*{startDate}"></div>
                </div>

                <div class="form-row">
                    <label for="endDate">Enddatum</label>
                    <input type="date" id="endDate" th:field="*{endDate}">
                    <div class="field-error" th:if="${#fields.hasErrors('endDate')}" th:errors="*{endDate}"></div>
                </div>
            </div>

            <div class="form-row">
                <label for="registrationDeadline">Anmeldefrist</label>
                <input type="date" id="registrationDeadline" th:field="*{registrationDeadline}">
                <div class="field-error" th:if="${#fields.hasErrors('registrationDeadline')}" th:errors="*{registrationDeadline}"></div>
            </div>

            <div class="form-row">
                <label for="numberOfRounds">Anzahl der Runden</label>
                <input type="number" id="numberOfRounds" th:field="*{numberOfRounds}" min="1">
                <div class="field-error" th:if="${#fields.hasErrors('numberOfRounds')}" th:errors="*{numberOfRounds}"></div>
            </div>

            <div class="form-row">
                <label for="status">Status</label>
                <select id="status" th:field="*{status}">
                    <option value="">Bitte wählen</option>
                    <option th:each="status : ${statuses}"
                            th:value="${status}"
                            th:text="${status.displayName}">
                    </option>
                </select>
                <div class="field-error" th:if="${#fields.hasErrors('status')}" th:errors="*{status}"></div>
            </div>

            <div class="form-row">
                <label for="description">Beschreibung</label>
                <textarea id="description" th:field="*{description}"></textarea>
            </div>

            <div class="actions">
                <button type="submit" th:text="${isEdit} ? 'Änderungen speichern' : 'Turnier speichern'"></button>
                <a class="btn btn-secondary" th:href="@{/tournaments}">Abbrechen</a>
            </div>
        </form>
    </section>

</main>

</body>
</html>
