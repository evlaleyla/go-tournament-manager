<!DOCTYPE html>
<html lang="de" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Turniere</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>

<div th:replace="~{fragments/header :: adminHeader}"></div>

<main class="container">

    <div class="page-header">
        <div>
            <h1>Turnierliste</h1>
            <p class="page-subtitle">
                Turniere suchen, filtern und verwalten.
            </p>
        </div>

        <div class="actions">
            <a class="btn" th:href="@{/tournaments/new}">
                Neues Turnier anlegen
            </a>
        </div>
    </div>

    <div th:if="${successMessage}" class="flash-success" th:text="${successMessage}"></div>
    <div th:if="${errorMessage}" class="flash-error" th:text="${errorMessage}"></div>

    <section class="card">
        <h2>Suche und Filter</h2>

        <form th:action="@{/tournaments}" method="get" class="form-grid">
            <div class="form-row">
                <label for="search">Suche nach Name</label>
                <input type="text"
                       id="search"
                       name="search"
                       th:value="${search}"
                       list="tournamentNameList"
                       placeholder="Turniername eingeben">

                <datalist id="tournamentNameList">
                    <option th:each="name : ${tournamentNames}" th:value="${name}"></option>
                </datalist>
            </div>

            <div class="form-row">
                <label for="status">Status</label>
                <select id="status" name="status">
                    <option value="">Alle</option>
                    <option th:each="statusOption : ${statuses}"
                            th:value="${statusOption}"
                            th:text="${statusOption.displayName}"
                            th:selected="${selectedStatus != null and selectedStatus.name() == statusOption.name()}">
                    </option>
                </select>
            </div>

            <div class="actions">
                <button type="submit">Filtern</button>
                <a class="btn btn-secondary" th:href="@{/tournaments}">Zurücksetzen</a>
            </div>
        </form>
    </section>

    <section class="card">
        <h2>Turniere</h2>

        <table th:if="${!#lists.isEmpty(tournaments)}">
            <thead>
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Ort</th>
                <th>Startdatum</th>
                <th>Enddatum</th>
                <th>Anmeldefrist</th>
                <th>Status</th>
                <th>Aktionen</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="tournament : ${tournaments}">
                <td th:text="${tournament.id}"></td>
                <td th:text="${tournament.name}"></td>
                <td th:text="${tournament.location}"></td>
                <td th:text="${tournament.startDate}"></td>
                <td th:text="${tournament.endDate}"></td>
                <td th:text="${tournament.registrationDeadline}"></td>
                <td>
                    <span class="badge" th:text="${tournament.status.displayName}"></span>
                </td>
                <td>
                    <div class="actions">
                        <a class="btn btn-secondary"
                           th:href="@{/tournaments/{id}(id=${tournament.id})}">
                            Details
                        </a>
                        <a class="btn btn-secondary"
                           th:href="@{/tournaments/{id}/edit(id=${tournament.id})}">
                            Bearbeiten
                        </a>
                    </div>
                </td>
            </tr>
            </tbody>
        </table>

        <div th:if="${#lists.isEmpty(tournaments)}" class="empty-state">
            Es wurden keine Turniere gefunden.
        </div>
    </section>

</main>

</body>
</html>
