<!DOCTYPE html>
<html lang="de" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Anmeldungsdetails</title>
  <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>

<div th:replace="~{fragments/header :: adminHeader}"></div>

<main class="container">

  <div class="page-header">
    <div>
      <h1>Anmeldungsdetails</h1>
      <p class="page-subtitle">
        Detailinformationen zu einer Turnieranmeldung.
      </p>
    </div>

    <div class="actions">
      <a class="btn btn-secondary" th:href="@{/registrations}">
        Zur Anmeldeliste
      </a>
    </div>
  </div>

  <div th:if="${successMessage}" class="flash-success" th:text="${successMessage}"></div>
  <div th:if="${errorMessage}" class="flash-error" th:text="${errorMessage}"></div>

  <section class="card">
    <h2>Anmeldung</h2>

    <dl class="detail-list">
      <dt>ID</dt>
      <dd th:text="${registration.id}"></dd>

      <dt>Turnier</dt>
      <dd th:text="${registration.tournament.name}"></dd>

      <dt>Teilnehmer</dt>
      <dd th:text="${registration.participant.fullName}"></dd>

      <dt>Anmeldedatum</dt>
      <dd th:text="${registration.registrationDate}"></dd>

      <dt>Ausgewählte Runden</dt>
      <dd th:text="${registration.selectedRoundsDisplayShort}"></dd>

      <dt>Anzahl ausgewählter Runden</dt>
      <dd th:text="${registration.selectedRoundCount}"></dd>

      <dt>Verein bei Anmeldung</dt>
      <dd th:text="${registration.clubAtRegistration}"></dd>

      <dt>Land bei Anmeldung</dt>
      <dd th:text="${registration.countryAtRegistration}"></dd>

      <dt>Rang bei Anmeldung</dt>
      <dd th:text="${registration.rankAtRegistration}"></dd>

      <dt>Notizen</dt>
      <dd th:text="${registration.notes}"></dd>
    </dl>
  </section>

  <section class="card">
    <h2>Administration</h2>

    <div class="actions">
      <a class="btn btn-secondary"
         th:href="@{/registrations/{id}/edit(id=${registration.id})}">
        Anmeldung bearbeiten
      </a>

      <form th:action="@{/registrations/{id}/delete(id=${registration.id})}"
            method="post"
            onsubmit="return confirm('Möchten Sie diese Anmeldung wirklich löschen?');">
        <button type="submit" class="btn-danger">
          Anmeldung löschen
        </button>
      </form>
    </div>
  </section>

</main>

</body>
</html>
